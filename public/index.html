<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auth Node Learning</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script type="module" src="/assets/app.js"></script>
  </head>
  <body>
    <main>
      <header>
        <p>Chapter 3 complete</p>
        <h1>Auth Node Learning</h1>
      </header>

      <section>
        <form id="signup-form">
          <h2>Sign up</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" minlength="10" maxlength="100" required>
          </label>
          <button class="primary" type="submit">Create account</button>
        </form>

        <form id="signin-form">
          <h2>Sign in</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary" type="submit">Sign in</button>
        </form>
      </section>

      <section>
        <h2>Session</h2>
        <pre id="output">Loading...</pre>

        <form id="verify-form">
          <label>
            Email verification code
            <input name="code" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="12345678">
          </label>
          <button class="secondary" type="submit">Verify email</button>
        </form>

        <div class="actions">
          <button class="secondary" id="refresh-button" type="button">Refresh</button>
          <button class="secondary" id="resend-button" type="button">Resend code</button>
          <button class="neutral" id="signout-button" type="button">Sign out</button>
          <button class="danger" id="signout-all-button" type="button">Sign out all</button>
        </div>
      </section>

      <section>
        <form id="password-change-form">
          <h2>Change password</h2>
          <label>
            Current password
            <input name="currentPassword" type="password" autocomplete="current-password" required>
          </label>
          <label>
            New password
            <input name="newPassword" type="password" autocomplete="new-password" minlength="10" maxlength="100" required>
          </label>
          <label class="checkbox">
            <input name="signOutOtherDevices" type="checkbox">
            Sign out other devices
          </label>
          <button class="primary" type="submit">Change password</button>
        </form>
      </section>

      <section>
        <form id="password-reset-start-form">
          <h2>Start password reset</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <button class="secondary" type="submit">Send reset code</button>
        </form>

        <form id="password-reset-finish-form">
          <h2>Finish password reset</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Reset code
            <input name="code" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="12345678">
          </label>
          <label>
            New password
            <input name="password" type="password" autocomplete="new-password" minlength="10" maxlength="100" required>
          </label>
          <label class="checkbox">
            <input name="signOutAllDevices" type="checkbox">
            Sign out all devices
          </label>
          <button class="danger" type="submit">Reset password</button>
        </form>
      </section>
    </main>
  </body>
</html>
